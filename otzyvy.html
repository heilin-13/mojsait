<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Отзывы — Таро Ильвины</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Playfair Display', serif;
      background: linear-gradient(135deg, #f5e6f0, #e0c3fc);
      padding: 20px;
    }
    .menu {
      max-width: 900px;
      margin: 0 auto 30px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      padding: 15px 30px;
      border-radius: 60px;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    .menu a {
      color: #4a148c;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      padding: 8px 0;
      border-bottom: 2px solid transparent;
    }
    .menu a:hover { border-bottom-color: #6a1b9a; }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 50px;
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(106,27,154,0.2);
      text-align: center;
    }
    h1 { color: #4a148c; font-size: 36px; margin-bottom: 10px; }
    .sub { font-size: 18px; color: #555; margin-bottom: 30px; }
    .gallery {
      display: flex;
      flex-direction: column;
      gap: 25px;
      align-items: center;
    }
    .gallery img {
      width: 100%;
      max-width: 500px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border: 3px solid white;
      transition: 0.3s;
    }
    .gallery img:hover { transform: scale(1.02); }
    .back {
      display: inline-block;
      margin-top: 30px;
      color: #6a1b9a;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border-bottom: 2px solid #6a1b9a;
      padding-bottom: 3px;
    }
    .back:hover { color: #4a148c; }
  </style>
</head>
<body>
  <div class="menu">
    <a href="https://cutt.ly/uyrZBNPg">Главная</a>
    <a href="https://cutt.ly/uyrZBNPg/about.html">Обо мне</a>
    <a href="https://cutt.ly/uyrZBNPg/otzyvy.html">Отзывы</a>
  </div>

  <div class="container">
    <h1>Отзывы</h1>
    <p class="sub">Спасибо моим замечательным клиентам за доверие</p>

    <div class="gallery">
      <img src="otzyv1.jpg" alt="Отзыв 1">
      <img src="otzyv2.jpg" alt="Отзыв 2">
      <img src="otzyv3.jpg" alt="Отзыв 3">
    </div>

    <a class="back" href="https://cutt.ly/uyrZBNPg">На главную</a>
  </div>
</body>
</html>
