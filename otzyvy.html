<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Отзывы — Таро Ильвины</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      padding-top: 80px;
    }
    .menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .logo { font-size: 24px; font-weight: 700; color: #fff; }
    .nav-links a {
      color: #fff;
      text-decoration: none;
      margin-left: 30px;
      font-size: 16px;
      font-weight: 500;
    }
    .nav-links a:hover { color: #a855f7; }
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      margin-bottom: 40px;
      background: linear-gradient(to right, #a855f7, #d946ef);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .gallery {
      display: flex;
      flex-direction: column;
      gap: 30px;
      align-items: center;
    }
    .gallery img {
      width: 100%;
      max-width: 500px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }
    .gallery img:hover { transform: scale(1.02); border-color: #a855f7; }
    .back {
      display: inline-block;
      margin-top: 40px;
      color: #a855f7;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }
    @media (max-width: 768px) {
      .menu { padding: 15px 20px; }
      .nav-links a { margin-left: 15px; font-size: 14px; }
      h1 { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="menu">
    <div class="logo">✦ Ильвина</div>
    <div class="nav-links">
      <a href="https://cutt.ly/uyrZBNPg">Главная</a>
      <a href="https://cutt.ly/uyrZBNPg/about.html">Обо мне</a>
      <a href="https://cutt.ly/uyrZBNPg/otzyvy.html">Отзывы</a>
    </div>
  </div>

  <div class="container">
    <h1>Отзывы</h1>
    <div class="gallery">
      <img src="otzyv1.jpg" alt="Отзыв 1">
      <img src="otzyv2.jpg" alt="Отзыв 2">
      <img src="otzyv3.jpg" alt="Отзыв 3">
      <img src="otzyv4.jpg" alt="Отзыв 4">
      <img src="otzyv5.jpg" alt="Отзыв 5">
    </div>
    <a class="back" href="https://cutt.ly/uyrZBNPg">← На главную</a>
  </div>
</body>
</html>
